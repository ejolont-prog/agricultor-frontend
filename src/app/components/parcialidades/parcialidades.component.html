<div class="page-container">
  <header class="section-header">
    <div class="title-group">
      <h1>Gestión de Parcialidades</h1>
      <p>Listado detallado de registros actuales</p>
    </div>
    <div class="action-buttons">
      <button mat-button class="back-btn" routerLink="/">
        <mat-icon>arrow_back</mat-icon> Regresar
      </button>
      <button mat-fab extended class="add-btn" routerLink="/parcialidades/nueva">
        <mat-icon>add</mat-icon> Nueva Parcialidad
      </button>
    </div>
  </header>

  <mat-card class="table-card">
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="custom-table">

        <ng-container matColumnDef="col1">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let row"> {{row.id}} </td>
        </ng-container>

        <ng-container matColumnDef="col2">
          <th mat-header-cell *matHeaderCellDef> Fecha </th>
          <td mat-cell *matCellDef="let row"> {{row.fecha}} </td>
        </ng-container>

        <ng-container matColumnDef="col3">
          <th mat-header-cell *matHeaderCellDef> Agricultor </th>
          <td mat-cell *matCellDef="let row"> {{row.nombre}} </td>
        </ng-container>

        <ng-container matColumnDef="col4">
          <th mat-header-cell *matHeaderCellDef> Producto </th>
          <td mat-cell *matCellDef="let row"> {{row.producto}} </td>
        </ng-container>

        <ng-container matColumnDef="col5">
          <th mat-header-cell *matHeaderCellDef> Cantidad </th>
          <td mat-cell *matCellDef="let row"> {{row.cantidad}} </td>
        </ng-container>

        <ng-container matColumnDef="col6">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let row"> {{row.estado}} </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let row">
            <button mat-button class="detail-btn">
              Ver Detalle
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card>
</div>
