<div class="page-container">
  <header class="section-header">
    <button mat-button class="back-btn" routerLink="/transportista">
      <mat-icon>arrow_back</mat-icon> Volver a Listado
    </button>
    <div class="title-group">
      <h1>Nuevo Transportista</h1>
      <p>Registra los datos personales y de conducción del transportista.</p>
    </div>
  </header>

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="transportistaForm" class="registro-form">



        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>CUI</mat-label>
            <input matInput formControlName="cui" placeholder="13 dígitos" maxlength="13" inputmode="numeric"
                   (keypress)="onlyNumbers($event)">
            <mat-icon matSuffix>fingerprint</mat-icon>
            <mat-error *ngIf="transportistaForm.get('cui')?.invalid">
              CUI debe contener 13 dígitos
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nombre Completo</mat-label>
            <input matInput formControlName="nombreCompleto" placeholder="Ej. Juan Manuel Arriola" (keypress)="onlyLetters($event)">
            <mat-icon matSuffix>person</mat-icon>
            <mat-error *ngIf="transportistaForm.get('nombreCompleto')?.hasError('nombreInvalido')">
              Debe colocar un nombre y un apellido como mínimo
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Fecha Nacimiento</mat-label>
            <input matInput [matDatepicker]="pickerNac" [max]="maxFechaNac" formControlName="fechaNacimiento" (keydown)="filterDateInput($event)">
            <mat-datepicker-toggle matIconSuffix [for]="pickerNac"></mat-datepicker-toggle>
            <mat-datepicker #pickerNac></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Tipo Licencia</mat-label>
            <mat-select formControlName="tipoLicencia">
              <mat-option *ngFor="let licencia of tiposLicencia" [value]="licencia.id">
                {{licencia.nombre}}
              </mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Fecha Vencimiento Licencia</mat-label>
            <input matInput [matDatepicker]="pickerVen" formControlName="fechaVencimientoLicencia" (keydown)="filterDateInput($event)">
            <mat-datepicker-toggle matIconSuffix [for]="pickerVen"></mat-datepicker-toggle>
            <mat-datepicker #pickerVen></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-button class="cancel-btn" type="button" (click)="cancelar()">
            Cancelar
          </button>

          <button mat-fab extended
                  class="create-btn"
                  type="button"
                  [disabled]="transportistaForm.invalid"
                  (click)="registrarTransportista()">
            <mat-icon>check_circle</mat-icon>
            Crear
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
